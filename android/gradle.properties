org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Usa os SDK platforms ja instalados (android-34/35/36) em vez de tentar
# reinstalar via Gradle. As cmdline-tools desta maquina sao mais antigas que
# os pacotes (XML v3 vs v4), entao o auto-download corrompia o unzip do
# android-34 e quebrava o build (regressao ao adicionar flutter_3d_controller
# -> flutter_inappwebview). Com isso o build usa o android-34 ja presente.
android.builder.sdkDownload=false
