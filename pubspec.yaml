name: noheroes_app
description: NoHeroes App soulslike de disciplina missoes sombra e progressao.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.3
  event_bus: ^2.0.0
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path: ^1.9.0
  path_provider: ^2.1.2
  shared_preferences: ^2.3.2
  json_annotation: ^4.9.0
  intl: ^0.19.0
  uuid: ^4.4.2
  http: ^1.2.2
  lottie: ^3.1.2
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  collection: ^1.18.0
  async: ^2.11.0
  logging: ^1.2.0
  google_fonts: ^8.0.2
  crypto: ^3.0.7
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.10
  json_serializable: ^6.9.2
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/shadow_phrases.json
    - assets/data/npc_dialogues.json
    - assets/data/lore_quests.json
    - assets/data/classes.json
    - assets/data/factions.json
    - assets/data/class_quests.json
    - assets/data/faction_admission_quests.json
    - assets/fonts/
