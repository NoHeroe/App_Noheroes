name: noheroes_app
description: >
  NoHeroes App — soulslike de disciplina, missões, sombra, inventário e progressão.
flutter_riverpod + Drift + Offline-first + Event-driven architecture.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.3
  event_bus: ^2.0.0
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.40
  path: ^1.9.0
  path_provider: ^2.1.2
  shared_preferences: ^2.3.2
  json_annotation: ^4.9.0
  intl: ^0.19.0
  uuid: ^4.4.2
  timezone: ^0.9.4
  image_picker: ^1.1.2
  http: ^1.2.2
  lottie: ^3.1.2
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  collection: ^1.18.0
  async: ^2.11.0
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.10
  json_serializable: ^6.9.2
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true
  fonts:
    - family: CinzelDecorative
      fonts:
        - asset: assets/fonts/CinzelDecorative-Regular.ttf
        - asset: assets/fonts/CinzelDecorative-Bold.ttf
          weight: 700
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
  assets:
    - assets/images/
    - assets/images/avatar/
    - assets/images/regions/
    - assets/images/ui/
    - assets/icons/
    - assets/icons/items/
    - assets/audio/
    - assets/data/
